<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фасад</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('assets/images/bg.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            color: #fff;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }

        .buttons a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .buttons a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="avatar">
            <img src="https://github.com/FoxatMe.png" alt="Avatar">
        </div>
        <h1>Фасад</h1>
        <p>Хз, чел какой-то</p>
        <div class="buttons">
            <a href="https://www.twitch.tv/FoxatMe" target="_blank"><span>Twitch</span></a>
            <a href="https://www.youtube.com/@FoxatMe" target="_blank"><span>YouTube</span></a>
            <a href="https://t.me/FoxatMe" target="_blank"><span>Telegram</span></a>
            <a href="https://github.com/FoxatMe" target="_blank"><span>GitHub</span></a>
        </div>
        <div class="footer">© 2026 FoxatMe</div>
    </div>
</body>

</html>
